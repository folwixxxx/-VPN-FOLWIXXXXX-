name: Auto-Expire and Update Subscriptions

on:
  schedule:
    - cron: '*/5 * * * *'      # Проверка истечения каждые 5 минут
    - cron: '0 */6 * * *'      # Обновление конфигов каждые 6 часов
  workflow_dispatch:

jobs:
  expire-subscriptions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Check and expire all users
        run: |
          NOW=$(date +%s)
          echo "🕐 Текущее время: $(date)"
          
          EXPIRED_COUNT=0
          ACTIVE_COUNT=0
          
          # Только нужные папки: all-sub и trial-sub
          for folder in all-sub trial-sub; do
            if [ -d "subscriptions/$folder" ]; then
              for expiry_file in subscriptions/$folder/*.expiry; do
                [ ! -f "$expiry_file" ] && continue
                
                username=$(basename "$expiry_file" .expiry)
                data_file="subscriptions/$folder/${username}.txt"
                EXPIRE=$(cat "$expiry_file" | tr -d ' \n\r')
                EXPIRE_DATE=$(date -d "@$EXPIRE" "+%Y-%m-%d %H:%M:%S" 2>/dev/null || echo "unknown")
                
                if [ $NOW -gt $EXPIRE ]; then
                  echo "❌ $folder/$username: подписка истекла (была до $EXPIRE_DATE)"
                  EXPIRED_COUNT=$((EXPIRED_COUNT + 1))
                  
                  # Удаляем старые файлы
                  rm -f "$data_file"
                  rm -f "$expiry_file"
                  rm -f "subscriptions/$folder/${username}.type" 2>/dev/null
                  
                  # Создаём пустышку (чтобы не было 404 ошибок)
                  echo "# profile-title: ❌ ПОДПИСКА ИСТЕКЛА ❌" > "$data_file"
                  echo "# profile-update-interval: 5" >> "$data_file"
                  echo "# status: EXPIRED" >> "$data_file"
                  echo "# expired: $EXPIRE_DATE" >> "$data_file"
                  echo "" >> "$data_file"
                  echo "vless://00000000-0000-0000-0000-000000000000@0.0.0.0:1?encryption=none#EXPIRED" >> "$data_file"
                  
                  echo "   ✅ Подписка удалена, создана пустышка"
                else
                  DAYS_LEFT=$(( ($EXPIRE - $NOW) / 86400 ))
                  echo "✅ $folder/$username: активна до $EXPIRE_DATE, осталось $DAYS_LEFT дней"
                  ACTIVE_COUNT=$((ACTIVE_COUNT + 1))
                fi
              done
            else
              mkdir -p "subscriptions/$folder"
            fi
          done
          
          echo ""
          echo "📊 ИТОГИ: Активных: $ACTIVE_COUNT, Истекших: $EXPIRED_COUNT"

      - name: 🧹 Clean orphaned files
        run: |
          for folder in all-sub trial-sub; do
            if [ -d "subscriptions/$folder" ]; then
              for txt_file in subscriptions/$folder/user_*.txt; do
                [ ! -f "$txt_file" ] && continue
                username=$(basename "$txt_file" .txt)
                expiry_file="subscriptions/$folder/${username}.expiry"
                
                # Если нет expiry файла и это не пустышка
                if [ ! -f "$expiry_file" ]; then
                  if ! grep -q "ИСТЕКЛА" "$txt_file"; then
                    echo "⚠️ Исправляю: $txt_file (нет expiry)"
                    rm -f "$txt_file"
                    echo "# profile-title: ❌ ПОДПИСКА ИСТЕКЛА ❌" > "$txt_file"
                    echo "# profile-update-interval: 5" >> "$txt_file"
                    echo "# status: EXPIRED" >> "$txt_file"
                    echo "" >> "$txt_file"
                    echo "vless://00000000-0000-0000-0000-000000000000@0.0.0.0:1?encryption=none#EXPIRED" >> "$txt_file"
                  fi
                fi
              done
            fi
          done

      - name: 💾 Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscriptions/ balances/ trials/ 2>/dev/null || true
          git add -u 2>/dev/null || true
          if ! git diff --quiet --staged; then
            git commit -m "⏰ Auto-expire $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

  update-active-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: 🔄 Check templates changed
        id: check_templates
        run: |
          # Проверяем изменения в шаблоне all-sub.txt
          if git diff --name-only HEAD~1 | grep -E "(all-sub\.txt)$" > /dev/null; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Обнаружены изменения в шаблоне all-sub.txt"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Шаблон не изменился"
          fi
      
      - name: 🔄 Update active subscriptions
        if: steps.check_templates.outputs.changed == 'true'
        run: |
          NOW=$(date +%s)
          UPDATED=0
          
          echo "🔄 НАЧАЛО ОБНОВЛЕНИЯ"
          echo "📅 Время: $(date)"
          
          # Обновляем all-sub
          if [ -f "all-sub.txt" ] && [ -d "subscriptions/all-sub" ]; then
            for expiry in subscriptions/all-sub/*.expiry; do
              [ ! -f "$expiry" ] && continue
              EXPIRE=$(cat "$expiry")
              [ $EXPIRE -lt $NOW ] && continue
              username=$(basename "$expiry" .expiry)
              cp "all-sub.txt" "subscriptions/all-sub/${username}.txt"
              sed -i "s/❀VPN USER❀/❀ALL-SUB ${username}❀/g" "subscriptions/all-sub/${username}.txt"
              echo "# Updated: $(date '+%Y-%m-%d %H:%M:%S')" >> "subscriptions/all-sub/${username}.txt"
              echo "🔄 all-sub/$username"
              UPDATED=$((UPDATED + 1))
            done
          fi
          
          # Пробные подписки НЕ обновляем автоматически
          
          echo "📊 Обновлено активных подписок: $UPDATED"

      - name: 💾 Commit updates
        if: steps.check_templates.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscriptions/
          if ! git diff --quiet --staged; then
            git commit -m "🔄 Auto-update subscriptions $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

  # Очистка просроченных пробных подписок
  clean-trial-subscriptions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🧹 Clean expired trial subscriptions
        run: |
          NOW=$(date +%s)
          CLEANED=0
          
          echo "🧹 ОЧИСТКА ПРОСРОЧЕННЫХ ПРОБНЫХ ПОДПИСОК"
          echo "🕐 Текущее время: $(date)"
          
          # Чистим trial-sub
          if [ -d "subscriptions/trial-sub" ]; then
            for expiry_file in subscriptions/trial-sub/*.expiry; do
              [ ! -f "$expiry_file" ] && continue
              EXPIRE=$(cat "$expiry_file" | tr -d ' \n\r')
              if [ $NOW -gt $EXPIRE ]; then
                username=$(basename "$expiry_file" .expiry)
                echo "🗑️ Удаляю просроченную пробную подписку: $username"
                rm -f "$expiry_file"
                rm -f "subscriptions/trial-sub/${username}.txt"
                rm -f "subscriptions/trial-sub/${username}.type" 2>/dev/null
                CLEANED=$((CLEANED + 1))
              fi
            done
          fi
          
          # Также проверяем trials/ папку с флагами использованных пробных периодов
          if [ -d "trials" ]; then
            for trial_flag in trials/trial_*; do
              [ ! -f "$trial_flag" ] && continue
              # Если файлу больше 30 дней — удаляем
              FILE_AGE=$(($(date +%s) - $(stat -c %Y "$trial_flag" 2>/dev/null || echo 0)))
              if [ $FILE_AGE -gt 2592000 ] && [ $FILE_AGE -ne 0 ]; then  # 30 дней
                echo "🗑️ Удаляю старый флаг пробного периода: $(basename "$trial_flag")"
                rm -f "$trial_flag"
              fi
            done
          fi
          
          echo "✅ Удалено просроченных пробных подписок: $CLEANED"
      
      - name: 💾 Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscriptions/trial-sub/ trials/ 2>/dev/null || true
          git add -u 2>/dev/null || true
          if ! git diff --quiet --staged; then
            git commit -m "🧹 Clean expired trials $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
