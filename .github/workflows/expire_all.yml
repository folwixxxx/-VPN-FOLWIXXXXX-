name: Auto-Expire and Update Subscriptions

on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  expire-subscriptions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: рҹ“Ҙ Checkout
        uses: actions/checkout@v4

      - name: рҹ”Қ Check and expire all users
        run: |
          NOW=$(date +%s)
          echo "рҹ•җ РўРөРәСғСүРөРө РІСҖРөРјСҸ: $(date)"
          
          EXPIRED_COUNT=0
          ACTIVE_COUNT=0
          
          for folder in def-sub ultra-sub full-sub fast-sub trial-sub; do
            if [ -d "subscriptions/$folder" ]; then
              for expiry_file in subscriptions/$folder/*.expiry; do
                if [ ! -f "$expiry_file" ]; then
                  continue
                fi
                
                username=$(basename "$expiry_file" .expiry)
                data_file="subscriptions/$folder/${username}.txt"
                EXPIRE=$(cat "$expiry_file" | tr -d ' \n\r')
                EXPIRE_DATE=$(date -d "@$EXPIRE" "+%Y-%m-%d %H:%M:%S" 2>/dev/null || echo "unknown")
                
                if [ $NOW -gt $EXPIRE ]; then
                  echo "вқҢ $folder/$username: РҝРҫРҙРҝРёСҒРәР° РёСҒСӮРөРәР»Р° (РұСӢР»Р° РҙРҫ $EXPIRE_DATE)"
                  EXPIRED_COUNT=$((EXPIRED_COUNT + 1))
                  
                  # РҹСғСҒСӮСӢСҲРәР° СҒ РёРҪС„РҫСҖРјР°СҶРёРөР№ РҫРұ РёСҒСӮРөСҮРөРҪРёРё
                  cat > "$data_file" << EOF
# profile-title: вқҢ РҹРһР”РҹРҳРЎРҡРҗ РҳРЎРўР•РҡРӣРҗ вқҢ
# profile-update-interval: 1440
# expired: $EXPIRE_DATE
# status: EXPIRED

vless://00000000-0000-0000-0000-000000000000@0.0.0.0:1?encryption=none#вҸ°%20РҹРһР”РҹРҳРЎРҡРҗ%20РҳРЎРўР•РҡРӣРҗ%20вҸ°
trojan://expired@0.0.0.0:443#EXPIRED
EOF
                  
                  rm -f "$expiry_file"
                  echo "   вң… Р—Р°РјРөРҪРөРҪ РҪР° РҝСғСҒСӮСӢСҲРәСғ: $data_file"
                else
                  DAYS_LEFT=$(( ($EXPIRE - $NOW) / 86400 ))
                  echo "вң… $folder/$username: Р°РәСӮРёРІРҪР° РҙРҫ $EXPIRE_DATE, РҫСҒСӮР°Р»РҫСҒСҢ $DAYS_LEFT РҙРҪРөР№"
                  ACTIVE_COUNT=$((ACTIVE_COUNT + 1))
                fi
              done
            else
              mkdir -p "subscriptions/$folder"
            fi
          done
          
          echo ""
          echo "рҹ“Ҡ РҳРўРһР“Рҳ: РҗРәСӮРёРІРҪСӢС…: $ACTIVE_COUNT, РҳСҒСӮРөРәСҲРёС…: $EXPIRED_COUNT"

      - name: рҹ§№ Clean orphaned files
        run: |
          for folder in def-sub ultra-sub full-sub fast-sub trial-sub; do
            if [ -d "subscriptions/$folder" ]; then
              for txt_file in subscriptions/$folder/user_*.txt; do
                [ ! -f "$txt_file" ] && continue
                username=$(basename "$txt_file" .txt)
                expiry_file="subscriptions/$folder/${username}.expiry"
                if [ ! -f "$expiry_file" ] && ! grep -q "РҳРЎРўР•РҡРӣРҗ" "$txt_file"; then
                  echo "вҡ пёҸ РҳСҒРҝСҖР°РІР»СҸСҺ: $txt_file"
                  cat > "$txt_file" << EOF
# profile-title: вқҢ РҹРһР”РҹРҳРЎРҡРҗ РҳРЎРўР•РҡРӣРҗ вқҢ
# profile-update-interval: 1440
# status: EXPIRED

vless://00000000-0000-0000-0000-000000000000@0.0.0.0:1?encryption=none#EXPIRED
EOF
                fi
              done
            fi
          done

      - name: рҹ’ҫ Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscriptions/ balances/ trials/ 2>/dev/null || true
          git add -u 2>/dev/null || true
          if ! git diff --quiet --staged; then
            git commit -m "вҸ° Auto-expire $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

  update-active-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: рҹ“Ҙ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: рҹ”„ Check templates changed
        id: check_templates
        run: |
          if git diff --name-only HEAD~1 | grep -E "(def-sub\.txt|ultra-sub\.txt|template\.txt|fast-sub\.txt|trial-sub\.txt)$" > /dev/null; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: рҹ”„ Update active subscriptions
        if: steps.check_templates.outputs.changed == 'true'
        run: |
          NOW=$(date +%s)
          UPDATED=0
          
          update_type() {
            local template=$1
            local type_name=$2
            local folder=$3
            [ ! -f "$template" ] && return
            [ ! -d "subscriptions/$folder" ] && return
            
            for expiry in subscriptions/$folder/*.expiry; do
              [ ! -f "$expiry" ] && continue
              EXPIRE=$(cat "$expiry")
              [ $EXPIRE -lt $NOW ] && continue
              username=$(basename "$expiry" .expiry)
              cp "$template" "subscriptions/$folder/${username}.txt"
              sed -i "s/вқҖVPN USERвқҖ/вқҖ${type_name} ${username}вқҖ/g" "subscriptions/$folder/${username}.txt"
              echo "# РһРұРҪРҫРІР»РөРҪРҫ: $(date '+%Y-%m-%d %H:%M:%S')" >> "subscriptions/$folder/${username}.txt"
              UPDATED=$((UPDATED + 1))
            done
          }
          
          update_type "def-sub.txt" "DEF-SUB" "def-sub"
          update_type "ultra-sub.txt" "ULTRA-SUB" "ultra-sub"
          update_type "template.txt" "FULL-SUB" "full-sub"
          update_type "fast-sub.txt" "FAST-SUB" "fast-sub"
          update_type "trial-sub.txt" "TRIAL" "trial-sub"
          
          echo "рҹ“Ҡ РһРұРҪРҫРІР»РөРҪРҫ: $UPDATED"

      - name: рҹ’ҫ Commit updates
        if: steps.check_templates.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscriptions/
          if ! git diff --quiet --staged; then
            git commit -m "рҹ”„ Auto-update subscriptions $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
