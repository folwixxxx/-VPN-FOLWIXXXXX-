name: Auto-Expire and Update Subscriptions

on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  expire-subscriptions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Check and expire all users
        run: |
          NOW=$(date +%s)
          echo "🕐 Текущее время: $(date)"
          
          EXPIRED_COUNT=0
          ACTIVE_COUNT=0
          
          for folder in def-sub ultra-sub full-sub fast-sub trial-sub; do
            if [ -d "subscriptions/$folder" ]; then
              for expiry_file in subscriptions/$folder/*.expiry; do
                if [ ! -f "$expiry_file" ]; then
                  continue
                fi
                
                username=$(basename "$expiry_file" .expiry)
                data_file="subscriptions/$folder/${username}.txt"
                EXPIRE=$(cat "$expiry_file" | tr -d ' \n\r')
                EXPIRE_DATE=$(date -d "@$EXPIRE" "+%Y-%m-%d %H:%M:%S" 2>/dev/null || echo "unknown")
                
                if [ $NOW -gt $EXPIRE ]; then
                  echo "❌ $folder/$username: подписка истекла (была до $EXPIRE_DATE)"
                  EXPIRED_COUNT=$((EXPIRED_COUNT + 1))
                  
                  rm -f "$data_file"
                  echo "# profile-title: ❌ ПОДПИСКА ИСТЕКЛА ❌" >> "$data_file"
                  echo "# profile-update-interval: 1440" >> "$data_file"
                  echo "# status: EXPIRED" >> "$data_file"
                  echo "# expired: $EXPIRE_DATE" >> "$data_file"
                  echo "" >> "$data_file"
                  echo "vless://00000000-0000-0000-0000-000000000000@0.0.0.0:1?encryption=none#EXPIRED" >> "$data_file"
                  echo "trojan://expired@0.0.0.0:443#EXPIRED" >> "$data_file"
                  
                  rm -f "$expiry_file"
                  echo "   ✅ Заменен на пустышку: $data_file"
                else
                  DAYS_LEFT=$(( ($EXPIRE - $NOW) / 86400 ))
                  echo "✅ $folder/$username: активна до $EXPIRE_DATE, осталось $DAYS_LEFT дней"
                  ACTIVE_COUNT=$((ACTIVE_COUNT + 1))
                fi
              done
            else
              mkdir -p "subscriptions/$folder"
            fi
          done
          
          echo ""
          echo "📊 ИТОГИ: Активных: $ACTIVE_COUNT, Истекших: $EXPIRED_COUNT"

      - name: 🧹 Clean orphaned files
        run: |
          for folder in def-sub ultra-sub full-sub fast-sub trial-sub; do
            if [ -d "subscriptions/$folder" ]; then
              for txt_file in subscriptions/$folder/user_*.txt; do
                [ ! -f "$txt_file" ] && continue
                username=$(basename "$txt_file" .txt)
                expiry_file="subscriptions/$folder/${username}.expiry"
                if [ ! -f "$expiry_file" ]; then
                  if ! grep -q "ИСТЕКЛА" "$txt_file"; then
                    echo "⚠️ Исправляю: $txt_file"
                    rm -f "$txt_file"
                    echo "# profile-title: ❌ ПОДПИСКА ИСТЕКЛА ❌" >> "$txt_file"
                    echo "# profile-update-interval: 1440" >> "$txt_file"
                    echo "# status: EXPIRED" >> "$txt_file"
                    echo "" >> "$txt_file"
                    echo "vless://00000000-0000-0000-0000-000000000000@0.0.0.0:1?encryption=none#EXPIRED" >> "$txt_file"
                  fi
                fi
              done
            fi
          done

      - name: 💾 Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscriptions/ balances/ trials/ 2>/dev/null || true
          git add -u 2>/dev/null || true
          if ! git diff --quiet --staged; then
            git commit -m "⏰ Auto-expire $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

  update-active-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: 🔄 Check templates changed
        id: check_templates
        run: |
          if git diff --name-only HEAD~1 | grep -E "(def-sub\.txt|ultra-sub\.txt|template\.txt|fast-sub\.txt|trial-sub\.txt)$" > /dev/null; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Обнаружены изменения"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Шаблоны не изменились"
          fi
      
      - name: 🔄 Update active subscriptions
        if: steps.check_templates.outputs.changed == 'true'
        run: |
          NOW=$(date +%s)
          UPDATED=0
          
          echo "🔄 НАЧАЛО ОБНОВЛЕНИЯ"
          echo "📅 Время: $(date)"
          
          if [ -f "def-sub.txt" ] && [ -d "subscriptions/def-sub" ]; then
            for expiry in subscriptions/def-sub/*.expiry; do
              [ ! -f "$expiry" ] && continue
              EXPIRE=$(cat "$expiry")
              [ $EXPIRE -lt $NOW ] && continue
              username=$(basename "$expiry" .expiry)
              cp "def-sub.txt" "subscriptions/def-sub/${username}.txt"
              sed -i "s/❀VPN USER❀/❀DEF-SUB ${username}❀/g" "subscriptions/def-sub/${username}.txt"
              echo "# Updated: $(date '+%Y-%m-%d %H:%M:%S')" >> "subscriptions/def-sub/${username}.txt"
              echo "🔄 def-sub/$username"
              UPDATED=$((UPDATED + 1))
            done
          fi
          
          if [ -f "ultra-sub.txt" ] && [ -d "subscriptions/ultra-sub" ]; then
            for expiry in subscriptions/ultra-sub/*.expiry; do
              [ ! -f "$expiry" ] && continue
              EXPIRE=$(cat "$expiry")
              [ $EXPIRE -lt $NOW ] && continue
              username=$(basename "$expiry" .expiry)
              cp "ultra-sub.txt" "subscriptions/ultra-sub/${username}.txt"
              sed -i "s/❀VPN USER❀/❀ULTRA-SUB ${username}❀/g" "subscriptions/ultra-sub/${username}.txt"
              echo "# Updated: $(date '+%Y-%m-%d %H:%M:%S')" >> "subscriptions/ultra-sub/${username}.txt"
              echo "🔄 ultra-sub/$username"
              UPDATED=$((UPDATED + 1))
            done
          fi
          
          if [ -f "template.txt" ] && [ -d "subscriptions/full-sub" ]; then
            for expiry in subscriptions/full-sub/*.expiry; do
              [ ! -f "$expiry" ] && continue
              EXPIRE=$(cat "$expiry")
              [ $EXPIRE -lt $NOW ] && continue
              username=$(basename "$expiry" .expiry)
              cp "template.txt" "subscriptions/full-sub/${username}.txt"
              sed -i "s/❀VPN USER❀/❀FULL-SUB ${username}❀/g" "subscriptions/full-sub/${username}.txt"
              echo "# Updated: $(date '+%Y-%m-%d %H:%M:%S')" >> "subscriptions/full-sub/${username}.txt"
              echo "🔄 full-sub/$username"
              UPDATED=$((UPDATED + 1))
            done
          fi
          
          if [ -f "fast-sub.txt" ] && [ -d "subscriptions/fast-sub" ]; then
            for expiry in subscriptions/fast-sub/*.expiry; do
              [ ! -f "$expiry" ] && continue
              EXPIRE=$(cat "$expiry")
              [ $EXPIRE -lt $NOW ] && continue
              username=$(basename "$expiry" .expiry)
              cp "fast-sub.txt" "subscriptions/fast-sub/${username}.txt"
              sed -i "s/❀VPN USER❀/❀FAST-SUB ${username}❀/g" "subscriptions/fast-sub/${username}.txt"
              echo "# Updated: $(date '+%Y-%m-%d %H:%M:%S')" >> "subscriptions/fast-sub/${username}.txt"
              echo "🔄 fast-sub/$username"
              UPDATED=$((UPDATED + 1))
            done
          fi
          
          if [ -f "trial-sub.txt" ] && [ -d "subscriptions/trial-sub" ]; then
            for expiry in subscriptions/trial-sub/*.expiry; do
              [ ! -f "$expiry" ] && continue
              EXPIRE=$(cat "$expiry")
              [ $EXPIRE -lt $NOW ] && continue
              username=$(basename "$expiry" .expiry)
              cp "trial-sub.txt" "subscriptions/trial-sub/${username}.txt"
              sed -i "s/❀VPN USER❀/❀TRIAL ${username}❀/g" "subscriptions/trial-sub/${username}.txt"
              echo "# Updated: $(date '+%Y-%m-%d %H:%M:%S')" >> "subscriptions/trial-sub/${username}.txt"
              echo "🔄 trial-sub/$username"
              UPDATED=$((UPDATED + 1))
            done
          fi
          
          echo "📊 Обновлено: $UPDATED"

      - name: 💾 Commit updates
        if: steps.check_templates.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscriptions/
          if ! git diff --quiet --staged; then
            git commit -m "🔄 Auto-update subscriptions $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
