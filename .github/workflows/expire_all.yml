name: Auto-Expire and Update Subscriptions

on:
  schedule:
    - cron: '*/5 * * * *'      # Проверка истечения каждые 5 минут
    - cron: '0 */6 * * *'      # Обновление конфигов каждые 6 часов
  workflow_dispatch:

jobs:
  expire-subscriptions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Check and expire all users
        run: |
          NOW=$(date +%s)
          echo "🕐 Current time: $(date)"
          
          EXPIRED_COUNT=0
          ACTIVE_COUNT=0
          
          # Только папки all-sub и trial-sub (старые удалены)
          for folder in all-sub trial-sub; do
            if [ -d "subscriptions/$folder" ]; then
              echo "📁 Checking folder: $folder"
              for expiry_file in subscriptions/$folder/user_*.expiry; do
                [ ! -f "$expiry_file" ] && continue
                
                username=$(basename "$expiry_file" .expiry)
                data_file="subscriptions/$folder/${username}.txt"
                EXPIRE=$(cat "$expiry_file" | tr -d ' \n\r')
                EXPIRE_DATE=$(date -d "@$EXPIRE" "+%Y-%m-%d %H:%M:%S" 2>/dev/null || echo "unknown")
                
                if [ -z "$EXPIRE" ]; then
                  echo "⚠️ Empty expiry file: $expiry_file"
                  continue
                fi
                
                if [ $NOW -gt $EXPIRE ]; then
                  echo "❌ $folder/$username: EXPIRED (was until $EXPIRE_DATE)"
                  EXPIRED_COUNT=$((EXPIRED_COUNT + 1))
                  
                  # Удаляем истекшие файлы
                  rm -f "$data_file"
                  rm -f "$expiry_file"
                  rm -f "subscriptions/$folder/${username}.type" 2>/dev/null
                  
                  # Создаём пустышку (чтобы не было 404)
                  echo "# profile-title: ❌ SUBSCRIPTION EXPIRED ❌" > "$data_file"
                  echo "# profile-update-interval: 5" >> "$data_file"
                  echo "# status: EXPIRED" >> "$data_file"
                  echo "# expired: $EXPIRE_DATE" >> "$data_file"
                  echo "" >> "$data_file"
                  echo "vless://00000000-0000-0000-0000-000000000000@0.0.0.0:1?encryption=none#EXPIRED" >> "$data_file"
                  
                  echo "   ✅ Dummy file created for $username"
                else
                  DAYS_LEFT=$(( ($EXPIRE - $NOW) / 86400 ))
                  echo "✅ $folder/$username: ACTIVE until $EXPIRE_DATE, $DAYS_LEFT days left"
                  ACTIVE_COUNT=$((ACTIVE_COUNT + 1))
                fi
              done
            else
              echo "📁 Creating folder: subscriptions/$folder"
              mkdir -p "subscriptions/$folder"
            fi
          done
          
          echo ""
          echo "📊 RESULTS: Active: $ACTIVE_COUNT, Expired: $EXPIRED_COUNT"

      - name: 🗑️ Clean old subscription folders (def-sub, ultra-sub, full-sub, fast-sub)
        run: |
          echo "🧹 Cleaning old subscription folders..."
          for old_folder in def-sub ultra-sub full-sub fast-sub custom-sub; do
            if [ -d "subscriptions/$old_folder" ]; then
              echo "🗑️ Removing old folder: subscriptions/$old_folder"
              rm -rf "subscriptions/$old_folder"
            fi
          done
          
          # Также удаляем старые шаблоны если есть
          for old_template in def-sub.txt ultra-sub.txt fast-sub.txt template.txt; do
            if [ -f "$old_template" ]; then
              echo "🗑️ Removing old template: $old_template"
              rm -f "$old_template"
            fi
          done

      - name: 🧹 Clean orphaned files
        run: |
          for folder in all-sub trial-sub; do
            if [ -d "subscriptions/$folder" ]; then
              echo "🧹 Checking orphaned files in $folder"
              for txt_file in subscriptions/$folder/user_*.txt; do
                [ ! -f "$txt_file" ] && continue
                username=$(basename "$txt_file" .txt)
                expiry_file="subscriptions/$folder/${username}.expiry"
                
                # Если нет expiry файла и это не пустышка
                if [ ! -f "$expiry_file" ]; then
                  if ! grep -q "EXPIRED" "$txt_file"; then
                    echo "⚠️ Fixing: $txt_file (no expiry file)"
                    rm -f "$txt_file"
                    echo "# profile-title: ❌ SUBSCRIPTION EXPIRED ❌" > "$txt_file"
                    echo "# profile-update-interval: 5" >> "$txt_file"
                    echo "# status: EXPIRED" >> "$txt_file"
                    echo "" >> "$txt_file"
                    echo "vless://00000000-0000-0000-0000-000000000000@0.0.0.0:1?encryption=none#EXPIRED" >> "$txt_file"
                    echo "   ✅ Fixed with dummy file"
                  fi
                fi
              done
            fi
          done

      - name: 💾 Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscriptions/ balances/ trials/ 2>/dev/null || true
          git add -u 2>/dev/null || true
          if ! git diff --quiet --staged; then
            git commit -m "⏰ Auto-expire $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "ℹ️ No changes to commit"
          fi

  update-active-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: 🔄 Check templates changed
        id: check_templates
        run: |
          if git diff --name-only HEAD~1 | grep -E "(all-sub\.txt)$" > /dev/null; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Template all-sub.txt changed"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Template not changed"
          fi
      
      - name: 🔄 Update active ALL-SUB subscriptions
        if: steps.check_templates.outputs.changed == 'true'
        run: |
          NOW=$(date +%s)
          UPDATED=0
          
          echo "🔄 STARTING UPDATE - ALL-SUB"
          echo "📅 Time: $(date)"
          
          if [ ! -f "all-sub.txt" ]; then
            echo "❌ Template all-sub.txt not found!"
            exit 1
          fi
          
          if [ ! -d "subscriptions/all-sub" ]; then
            echo "❌ Folder subscriptions/all-sub not found!"
            mkdir -p subscriptions/all-sub
          fi
          
          for expiry in subscriptions/all-sub/user_*.expiry; do
            [ ! -f "$expiry" ] && continue
            EXPIRE=$(cat "$expiry")
            if [ -z "$EXPIRE" ]; then
              echo "⚠️ Empty expiry file: $expiry"
              continue
            fi
            if [ $EXPIRE -lt $NOW ]; then
              echo "⏭️ Skipping expired: $expiry"
              continue
            fi
            username=$(basename "$expiry" .expiry)
            username=$(echo "$username" | sed 's/user_//')
            
            echo "🔄 Updating config for user_$username"
            cp "all-sub.txt" "subscriptions/all-sub/user_${username}.txt"
            sed -i "s/❀VPN USER❀/❀ALL-SUB ${username}❀/g" "subscriptions/all-sub/user_${username}.txt"
            echo "# Updated: $(date '+%Y-%m-%d %H:%M:%S')" >> "subscriptions/all-sub/user_${username}.txt"
            UPDATED=$((UPDATED + 1))
          done
          
          echo "📊 Updated ALL-SUB subscriptions: $UPDATED"

      - name: 💾 Commit updates
        if: steps.check_templates.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscriptions/
          if ! git diff --quiet --staged; then
            git commit -m "🔄 Auto-update subscriptions $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "ℹ️ No updates to commit"
          fi

  clean-trial-subscriptions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🧹 Clean expired trial subscriptions
        run: |
          NOW=$(date +%s)
          CLEANED=0
          
          echo "🧹 CLEANING EXPIRED TRIAL SUBSCRIPTIONS"
          echo "🕐 Time: $(date)"
          
          if [ -d "subscriptions/trial-sub" ]; then
            for expiry_file in subscriptions/trial-sub/user_*.expiry; do
              [ ! -f "$expiry_file" ] && continue
              EXPIRE=$(cat "$expiry_file" | tr -d ' \n\r')
              if [ -z "$EXPIRE" ]; then
                echo "⚠️ Empty expiry file: $expiry_file"
                continue
              fi
              if [ $NOW -gt $EXPIRE ]; then
                username=$(basename "$expiry_file" .expiry)
                username=$(echo "$username" | sed 's/user_//')
                echo "🗑️ Deleting expired trial: user_$username"
                rm -f "$expiry_file"
                rm -f "subscriptions/trial-sub/user_${username}.txt"
                rm -f "subscriptions/trial-sub/user_${username}.type" 2>/dev/null
                CLEANED=$((CLEANED + 1))
              fi
            done
          fi
          
          # Очистка старых флагов пробного периода (старше 30 дней)
          if [ -d "trials" ]; then
            for trial_flag in trials/trial_*; do
              [ ! -f "$trial_flag" ] && continue
              FILE_AGE=$(($(date +%s) - $(stat -c %Y "$trial_flag" 2>/dev/null || echo 0)))
              if [ $FILE_AGE -gt 2592000 ] && [ $FILE_AGE -ne 0 ]; then
                echo "🗑️ Deleting old trial flag: $(basename "$trial_flag")"
                rm -f "$trial_flag"
              fi
            done
          fi
          
          echo "✅ Cleaned expired trials: $CLEANED"
      
      - name: 💾 Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscriptions/trial-sub/ trials/ 2>/dev/null || true
          git add -u 2>/dev/null || true
          if ! git diff --quiet --staged; then
            git commit -m "🧹 Clean expired trials $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "ℹ️ No trials to clean"
          fi
