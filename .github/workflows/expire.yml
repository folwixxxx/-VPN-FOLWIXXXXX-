name: Auto-Expire Subscription

on:
  schedule:
    - cron: '0 0 * * *'   # каждый день в 00:00 UTC
  workflow_dispatch:       # можно запустить вручную

jobs:
  expire:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check expiry date
        id: check
        run: |
          NOW=$(date +%s)
          EXPIRE=$(cat expiry_date.txt | tr -d ' \n\r')
          if [ $NOW -gt $EXPIRE ]; then
            echo "expired=true" >> $GITHUB_OUTPUT
          fi

      - name: Replace with dummy subscription
        if: steps.check.outputs.expired == 'true'
        run: |
          cat > sub-def.txt << 'EOF'
          #profile-title: ❌ SUBSCRIPTION EXPIRED ❌
          #profile-update-interval: 1440

          vless://00000000-0000-0000-0000-000000000000@0.0.0.0:1?encryption=none#⏰%20SUBSCRIPTION%20EXPIRED%20⏰
          EOF

      - name: Commit and push
        if: steps.check.outputs.expired == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sub-def.txt
          git commit -m "Auto-expire subscription" || exit 0
          git push
