name: Auto-Expire Subscription

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  expire:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Check if expired
        id: check
        run: |
          NOW=$(date +%s)
          EXPIRE=$(cat expiry_date.txt)
          if [ $NOW -gt $EXPIRE ]; then
            echo "expired=true" >> $GITHUB_OUTPUT
          fi

      - name: Replace with dummy
        if: steps.check.outputs.expired == 'true'
        run: |
          cat > def-sub.txt << 'EOF'
          #profile-title: ❌ ПОДПИСКА ИСТЕКЛА ❌
          #profile-update-interval: 1440
          
          vless://00000000-0000-0000-0000-000000000000@0.0.0.0:1?encryption=none#⏰%20ПОДПИСКА%20ИСТЕКЛА%20⏰
          EOF

      - name: Push changes
        if: steps.check.outputs.expired == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add def-sub.txt
          git commit -m "Auto-expire subscription" || exit 0
          git push
